{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'style.css'%}" />
</head>
<body class="theme-cream" style="margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;background-image: url('{% static 'BackGroundLogin.jpg' %}'); background-size: cover; background-position: center; background-repeat: no-repeat;">
    <header class="header">
        <div class="container" style="display: flex; justify-content: center;">
            <nav class="nav" aria-label="Primary navigation">
                <p class="brand" style="margin: 0;">
                    <span style="display: inline-block; margin-top: 15px; margin-bottom: 15px; font-size: 24px;"> Sweet Сookie Paradise </span>
                </p>
            </nav>
        </div>
    </header>
    <main class="auth-page" style="flex-grow: 1; display: flex; align-items: center; justify-content: center; padding-bottom: 140px;">
        <section class="auth-card">
            <h1>Welcome back</h1>
            <p>Sign in to continue your order, view offers, and manage your profile.</p>

            <!-- ИЗМЕНЕНИЕ: Добавлен метод POST и action на твой login_view -->
            <form class="auth-form" method="POST" action="{% url 'Login' %}">
                <!-- ИЗМЕНЕНИЕ: CSRF токен обязателен -->
                {% csrf_token %}

                <!-- ИЗМЕНЕНИЕ: Вывод ошибок (например, если пароль неверный) -->
                {% if form.errors %}
                <div style="color: red; margin-bottom: 10px; font-size: 14px;">
                    Invalid email or password.
                </div>
                {% endif %}

                <!-- ИЗМЕНЕНИЕ: name="username". В Django AuthenticationForm поле называется так -->
                <!-- Если ты хочешь входить именно по Email, это настраивается отдельно, 
                     но по стандарту Django ждет username -->
                <input class="input" type="text" name="username" placeholder="Username" required />
                
                <!-- ИЗМЕНЕНИЕ: name="password" -->
                <input class="input" type="password" name="password" placeholder="Password" required />

                <div class="auth-actions">
                    <button class="btn btn-primary" type="submit">Log In</button>
                    <a class="btn btn-secondary" href="{% url 'HomePage' %}">Home</a>
                </div>
            </form>

            <div class="auth-switch">No account yet? <a href="{% url 'Register' %}">Sign up</a></div>
        </section>
    </main>
    <script src="{% static 'theme.js' %}"></script>
</body>
</html>
